# Root-level Netlify config for the monorepo's recruitment app
# (join.cethos.com). Netlify picks this up when the Netlify site is
# connected to the repo root with no base directory set.
#
# If you operate the vendor portal (apps/vendor/) from the same repo on
# a separate Netlify site, set that site's Base directory to
# "apps/vendor" in the Netlify UI — it will use apps/vendor/netlify.toml
# and ignore this file.

[build]
  base = "apps/recruitment"
  command = "npm run build"
  publish = "apps/recruitment/dist"

# SPA catch-all: any client-router path returns index.html so React Router
# can take over. Must come before any more specific redirects.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ============================================================================
# Security headers (audit finding M-4). Mirrors the vendor portal's
# apps/vendor/netlify.toml — keep them in sync. See that file for rationale.
# ============================================================================

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://browser.sentry-cdn.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://lmzoyezvsjgsxveoakdr.supabase.co https://*.supabase.co https://*.sentry.io https://api.brevo.com https://api.mailgun.net; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
