  to = "/.netlify/functions/get-nda-status"
  status = 200
  force = true

[[redirects]]
  from = "/sb/nda-otp-send"
  to = "/.netlify/functions/nda-otp-send"
  status = 200
  force = true

[[redirects]]
  from = "/sb/nda-otp-verify"
  to = "/.netlify/functions/nda-otp-verify"
  status = 200
  force = true

[[redirects]]
