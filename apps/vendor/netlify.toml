# NDA — status, two-factor OTP gating, and signing.
[[redirects]]
  from = "/sb/get-nda-status"
  to = "/.netlify/functions/get-nda-status"
  status = 200
  force = true

[[redirects]]
  from = "/sb/nda-otp-send"
  to = "/.netlify/functions/nda-otp-send"
  status = 200
  force = true

[[redirects]]
