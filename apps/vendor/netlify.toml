[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Explicit bundler + Node version. Netlify's auto-detect can miss TS
# functions in monorepo subdirs; this nails it down.
[functions]
  node_bundler = "esbuild"
  # Files prefixed with _ are helper modules, not functions. Excluding
  # them avoids Netlify trying to deploy _lib/*.ts as separate endpoints.
  included_files = ["netlify/functions/_lib/**"]

[build.environment]
  NODE_VERSION = "20"
  # DB_HOST/PORT/USER/NAME and MAILGUN_DOMAIN/SENDER_* aren't secrets —
  # they're connection metadata. Netlify's secret scanner flags them
  # because their literal values also appear in source as defaults /
  # docstrings. Only DB_PASSWORD, MAILGUN_API_KEY, and the database URL
  # are real secrets and stay scanned.
  SECRETS_SCAN_OMIT_KEYS = "DB_HOST,DB_PORT,DB_USER,DB_NAME,MAILGUN_DOMAIN,MAILGUN_SENDER_EMAIL,MAILGUN_SENDER_NAME"

# Same-origin auth proxy via Netlify Function (Lambda) → direct Postgres.
# Bypasses Supabase HTTPS edge entirely; the browser only ever talks to
# vendor.cethos.com, and the Lambda connects to Supabase Postgres on
# port 6543 (totally separate network path, never blocked).
#
# Phase 1: login only (auth-check, auth-otp-send, auth-otp-verify).
# Other endpoints still hit Supabase HTTPS — port them here as needed.
[[redirects]]
  from = "/sb/auth-check"
  to = "/.netlify/functions/auth-check"
  status = 200
  force = true

[[redirects]]
  from = "/sb/auth-otp-send"
  to = "/.netlify/functions/auth-otp-send"
  status = 200
  force = true

[[redirects]]
  from = "/sb/auth-otp-verify"
  to = "/.netlify/functions/auth-otp-verify"
  status = 200
  force = true

# Phase 1.5: federated SSO infrastructure. Vendor portal mints JWTs for
# handoffs into other Cethos surfaces (TM today; admin/customer later).
# See docs/migration/00-overview-federated-sso.md (admin repo) for the
# full architecture and trust model.
[[redirects]]
  from = "/.well-known/jwks.json"
  to = "/.netlify/functions/jwks"
  status = 200
  force = true

[[redirects]]
  from = "/sb/sso-issue"
  to = "/.netlify/functions/sso-issue"
  status = 200
  force = true

[[redirects]]
  from = "/sb/auth-logout"
  to = "/.netlify/functions/auth-logout"
  status = 200
  force = true

# Phase 2: post-login data endpoints (jobs list, job detail, accept/decline).
# Same Lambda + direct Postgres pattern, session_token in request body.
[[redirects]]
  from = "/sb/auth-session"
  to = "/.netlify/functions/auth-session"
  status = 200
  force = true

[[redirects]]
  from = "/sb/get-jobs"
  to = "/.netlify/functions/get-jobs"
  status = 200
  force = true

[[redirects]]
  from = "/sb/get-job-detail"
  to = "/.netlify/functions/get-job-detail"
  status = 200
  force = true

[[redirects]]
  from = "/sb/accept-step"
