  to = "/.netlify/functions/sign-nda"
  status = 200
  force = true

# Contractor type upgrade request (individual → business).
[[redirects]]
  from = "/sb/request-contractor-upgrade"
  to = "/.netlify/functions/request-contractor-upgrade"
  status = 200
  force = true

# ISO 17100 evidence request list — surfaces open document requests on
# the /documents page so vendors can act on them without the email link.
[[redirects]]
  from = "/sb/list-doc-requests"
  to = "/.netlify/functions/list-doc-requests"
  status = 200
  force = true

# CV upload + list — proxied through Netlify so vendors in geo-blocked
# regions (Pakistan confirmed 2026-05-16) can still upload/manage their
# CV. Outbound call from the Lambda to api.cethos.com is unaffected.
[[redirects]]
  from = "/sb/upload-cv"
  to = "/.netlify/functions/upload-cv"
  status = 200
  force = true

[[redirects]]
  from = "/sb/list-cvs"
  to = "/.netlify/functions/list-cvs"
  status = 200
  force = true

# Job-assigned email (test endpoint + future production trigger).
[[redirects]]
  from = "/sb/accept-direct-assign"
  to = "/.netlify/functions/accept-direct-assign"
  status = 200
  force = true

[[redirects]]
  from = "/sb/test-job-assigned-email"
  to = "/.netlify/functions/test-job-assigned-email"
  status = 200
  force = true

# SPA catch-all.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ============================================================================
# Security headers (audit finding M-4).
#
# Applied to every response served from vendor.cethos.com:
#   * HSTS — force HTTPS, include subdomains, eligible for browser preload.
#   * X-Frame-Options — block clickjacking via iframe embedding.
#   * X-Content-Type-Options — disable MIME-type sniffing.
#   * Referrer-Policy — never send referrer past origin (protects session
#     tokens that could otherwise leak via Referer to outbound links).
#   * Permissions-Policy — deny camera/microphone/geolocation/payment APIs
#     that the vendor portal doesn't use.
#   * Content-Security-Policy — restrict where scripts, styles, images,
#     fonts, and XHR/fetch targets can come from. Allows the prod origins
#     used today (Supabase REST, edge functions, storage; Sentry; Brevo);
#     update when adding a new provider. `'unsafe-inline'` is needed for
#     Vite's runtime style injection — accept until a CSP-friendly build
#     pipeline lands.
# ============================================================================

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://browser.sentry-cdn.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.cethos.com https://lmzoyezvsjgsxveoakdr.supabase.co https://*.supabase.co https://*.sentry.io https://api.brevo.com https://api.mailgun.net; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
