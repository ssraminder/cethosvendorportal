  status = 200
  force = true

[[redirects]]
  from = "/sb/decline-step"
  to = "/.netlify/functions/decline-step"
  status = 200
  force = true

# Phase 3: profile + services & rates endpoints. Same /sb/* pattern,
# session_token in body, text/plain content-type to skip CORS preflight.
[[redirects]]
  from = "/sb/get-profile"
  to = "/.netlify/functions/get-profile"
  status = 200
  force = true

[[redirects]]
  from = "/sb/update-profile"
