[build]
  command = "npm run build"
  publish = "dist"

# NOTE: tried a Netlify Edge Function proxy at /sb/* → Supabase (to bypass
# the CORS preflight that some state-level filters drop). Confirmed
# unworkable: Netlify-Edge → Supabase's Cloudflare edge consistently
# returns NOT_FOUND even for hardcoded fetches. CF-to-CF peer-block.
# If we re-attempt, use a Cloudflare Worker (same-CF, no peer block)
# or a small VPS proxy instead.

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
