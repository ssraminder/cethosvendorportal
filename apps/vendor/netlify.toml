  force = true

# Contractor type upgrade request (individual → business).
[[redirects]]
  from = "/sb/request-contractor-upgrade"
  to = "/.netlify/functions/request-contractor-upgrade"
  status = 200
  force = true

# ISO 17100 evidence request list — surfaces open document requests on
# the /documents page so vendors can act on them without the email link.
[[redirects]]
  from = "/sb/list-doc-requests"
  to = "/.netlify/functions/list-doc-requests"
  status = 200
  force = true

# SPA catch-all.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
